version: "3.8"
services:
  app:
    build: .
    ports:
      - "3456:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-sentro}:${POSTGRES_PASSWORD:-sentro}@db:5432/${POSTGRES_DB:-sentro}?schema=public"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentro}
      POSTGRES_DB: ${POSTGRES_DB:-sentro}
    volumes:
      - sentro-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentro"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
volumes:
  sentro-data:
