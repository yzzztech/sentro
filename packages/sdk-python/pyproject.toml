[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sentro-sdk"
version = "0.1.0"
description = "Python SDK for Sentro — error tracking and agent observability"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
